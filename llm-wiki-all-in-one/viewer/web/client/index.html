<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>LLM Wiki</title>
    <link rel="preconnect" href="https://rsms.me/" />
    <link rel="stylesheet" href="https://rsms.me/inter/inter.css" />
    <link rel="stylesheet" href="/assets/styles.css" />
    <link rel="stylesheet" href="/katex/katex.min.css" />
  </head>
  <body>
    <header id="topbar" class="glass">
      <div class="topbar-left">
        <span class="brand"><span class="brand-dot"></span>LLM Wiki</span>
        <span id="wiki-title"></span>
      </div>
      <div class="topbar-right">
        <div id="search-box">
          <button id="btn-search" class="btn btn-search" type="button" aria-expanded="false" aria-controls="search-panel" title="Search (Ctrl+K or /)">
            <span>⌕</span> Search
            <kbd>Ctrl K</kbd>
          </button>
          <div id="search-panel" class="glass" role="search">
            <input id="search-input" type="search" autocomplete="off" spellcheck="false" placeholder="Search wiki" aria-label="Search wiki" />
            <div id="search-status" aria-live="polite"></div>
            <div id="search-results"></div>
          </div>
        </div>
        <button id="btn-refresh" class="btn btn-icon btn-ghost" type="button" title="Refresh audits">↻</button>
      </div>
    </header>

    <aside id="sidebar-left" class="glass">
      <header>
        <h1>Navigation</h1>
      </header>
      <nav id="tree"><p class="loading">Loading tree</p></nav>
    </aside>

    <main>
      <article id="page-content"><p class="loading">Loading page</p></article>
    </main>

    <aside id="sidebar-right" class="glass">
      <header>
        <h2>Open audits</h2>
      </header>
      <div id="audit-list"><p class="muted" style="padding: 14px;">—</p></div>
    </aside>

    <div id="feedback-popover" class="hidden">
      <button id="feedback-trigger" class="btn btn-cta" type="button">💬 Add feedback</button>
    </div>

    <dialog id="feedback-dialog">
      <form id="feedback-form">
        <div class="dialog-inner">
          <h3>New audit feedback</h3>

          <div class="field">
            <label class="field-label">Selected text</label>
            <pre id="feedback-preview"></pre>
          </div>

          <div class="field">
            <label class="field-label">Severity</label>
            <div id="feedback-severity">
              <label data-sev="info"><input type="radio" name="severity" value="info" /><span class="chip">info</span></label>
              <label data-sev="suggest"><input type="radio" name="severity" value="suggest" /><span class="chip">suggest</span></label>
              <label data-sev="warn"><input type="radio" name="severity" value="warn" checked /><span class="chip">warn</span></label>
              <label data-sev="error"><input type="radio" name="severity" value="error" /><span class="chip">error</span></label>
            </div>
          </div>

          <div class="field">
            <label class="field-label" for="feedback-comment">Comment (markdown allowed)</label>
            <textarea id="feedback-comment" placeholder="Explain what's wrong or what should change…"></textarea>
          </div>

          <div class="dialog-buttons">
            <button type="button" id="feedback-cancel" class="btn btn-ghost">Cancel</button>
            <button type="submit" id="feedback-save" class="btn btn-cta">Save feedback</button>
          </div>
        </div>
      </form>
    </dialog>

    <script type="module" src="/assets/main.js"></script>
  </body>
</html>
